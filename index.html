<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صورة.jpg</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: red;
      font-family: Tahoma, Arial, sans-serif;
      overflow: hidden;
    }

    #fakeImage {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: block;
    }

    #terminal {
      display: none;
      padding: 20px;
      font-size: 22px;
      white-space: pre-line;
      direction: rtl;
      text-align: right;
    }
  </style>
</head>
<body>

  <img id="fakeImage" src="https://picsum.photos/1200/800" alt="صورة">

  <div id="terminal"></div>

  <script>
    const terminal = document.getElementById("terminal");
    const fakeImage = document.getElementById("fakeImage");

    const lines = [
      "جاري فتح الصورة...",
      "تم اكتشاف نشاط غير طبيعي!",
      "جاري فحص الجهاز...",
      "تم الوصول إلى بيانات المستخدم...",
      "تم اختراق جميع برامج التواصل!",
      "جاري سحب الصور والفيديوهات...",
      "جاري نسخ المحادثات...",
      "تحذير: تم تسريب جميع البيانات!",
      "",
      "سيتم قفل الجهاز خلال 10 ثوانٍ..."
    ];

    setTimeout(() => {
      fakeImage.style.display = "none";
      terminal.style.display = "block";

      let i = 0;

      function typeLine() {
        if (i < lines.length) {
          terminal.innerHTML += lines[i] + "\n";
          i++;
          setTimeout(typeLine, 1000);
        } else {
          setTimeout(() => {
            document.body.innerHTML = `
              <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;text-align:center;">
                <h1 style="font-size:60px;color:red;">يله ادعبل فرخي </h1>
                <p style="font-size:30px;color:white;">افرييييييخ</p>
              </div>
            `;
          }, 2500);
        }
      }

      typeLine();
    }, 2000);
  </script>
</body>
</html>
